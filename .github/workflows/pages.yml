name: Deploy docs to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx honkit@6.2.2 build
      - name: Strip generator branding
        run: |
          find _book -name '*.html' -print0 | xargs -0 perl -0pi -e \
            's/ · HonKit<\/title>/<\/title>/g; s/[ \t]*<meta name="generator"[^>]*>\n?//g; s{\s*<li>\s*<a href="https:\/\/github\.com\/honkit\/honkit".*?<\/a>\s*<\/li>}{}gs;'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
